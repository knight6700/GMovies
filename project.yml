# Regenerate: make project
# Full setup:  make setup

name: GMovies

options:
  bundleIdPrefix: com.mahmoudfares
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

# ── Build Configurations ──────────────────────────────────────
# One per environment. Scheme selects which config to use.
configs:
  Debug-Dev:     debug
  Debug-Staging: debug
  Release-Prod:  release

# ── Local SPM Packages ────────────────────────────────────────
packages:
  Utilities:
    path: Packages/Utilities
  Networking:
    path: Packages/Networking
  Persistence:
    path: Packages/Persistence
  DesignSystem:
    path: Packages/DesignSystem
  MoviesFeature:
    path: Packages/MoviesFeature
  swift-snapshot-testing:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.16.0"

# ── Targets ───────────────────────────────────────────────────
targets:

  # ── App ───────────────────────────────────────────────────
  GMovies:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GMoviesApp
        createIntermediateGroups: true
    dependencies:
      - package: Networking
        product: Networking
      - package: Utilities
        product: Utilities
      - package: Persistence
        product: Persistence
      - package: DesignSystem
        product: DesignSystem
      - package: MoviesFeature
        product: Movies
      - package: MoviesFeature
        product: MovieDetails
      - sdk: Network.framework
    configFiles:
      Debug-Dev: GMoviesApp/Config/Dev.xcconfig
      Debug-Staging: GMoviesApp/Config/Staging.xcconfig
      Release-Prod: GMoviesApp/Config/Prod.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mahmoudfares.GMovies
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: GMoviesApp/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        ENABLE_TESTABILITY: YES
      configs:
        Debug-Dev:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG DEV
          PRODUCT_BUNDLE_IDENTIFIER: com.mahmoudfares.GMovies.dev
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-Dev
        Debug-Staging:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG STAGING
          PRODUCT_BUNDLE_IDENTIFIER: com.mahmoudfares.GMovies.staging
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-Staging
        Release-Prod:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: PROD
          PRODUCT_BUNDLE_IDENTIFIER: com.mahmoudfares.GMovies
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  GMoviesTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GMoviesAppTests
        createIntermediateGroups: true
    dependencies:
      - target: GMovies
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mahmoudfares.GMovies.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GMovies.app/GMovies"
        BUNDLE_LOADER: "$(TEST_HOST)"

  # ── Unit Tests ───────────────────────────────────────────────
  # All test targets now live inside the MoviesFeature SPM package
  # (NetworkingTests, UtilitiesTests, MoviesTests, MoviesSnapshot,
  #  MovieDetailsTests, MovieDetailsSnapshot, DesignSystemSnapshot)
  # — run via the MoviesFeature-Package scheme.

# ── Schemes ───────────────────────────────────────────────────
schemes:

  GMovies-Dev:
    build:
      targets:
        GMovies: all
        GMoviesTests: all
    run:
      config: Debug-Dev
    test:
      config: Debug-Dev
      gatherCoverageData: true
      targets:
        - GMoviesTests

  GMovies-Staging:
    build:
      targets:
        GMovies: all
        GMoviesTests: all
    run:
      config: Debug-Staging
    test:
      config: Debug-Staging
      targets:
        - GMoviesTests
    profile:
      config: Debug-Staging
    archive:
      config: Debug-Staging

  GMovies-Prod:
    build:
      targets:
        GMovies: all
        GMoviesTests: all
    run:
      config: Release-Prod
    profile:
      config: Release-Prod
    archive:
      config: Release-Prod
