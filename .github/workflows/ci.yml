name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DERIVED_DATA_PATH: DerivedData
  CI: true
  SWIFTLINT_VERSION: 0.63.2

jobs:

  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Restore SwiftLint cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /usr/local/bin/swiftlint
          key: swiftlint-${{ runner.os }}-${{ runner.arch }}-${{ env.SWIFTLINT_VERSION }}

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint &> /dev/null; then
            case "$(uname -m)" in
              x86_64|amd64)
                SWIFTLINT_ARCHIVE="swiftlint_linux_amd64.zip"
                ;;
              aarch64|arm64)
                SWIFTLINT_ARCHIVE="swiftlint_linux_arm64.zip"
                ;;
              *)
                echo "Unsupported runner architecture: $(uname -m)"
                exit 1
                ;;
            esac

            SWIFTLINT_URL="https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/${SWIFTLINT_ARCHIVE}"
            curl -fsSL "$SWIFTLINT_URL" -o swiftlint.zip
            unzip -q swiftlint.zip swiftlint
            sudo install swiftlint /usr/local/bin/swiftlint
          fi

      - name: Print SwiftLint version
        run: swiftlint version

      - name: Run SwiftLint
        run: swiftlint lint --config .swiftlint.yml --reporter json > swiftlint-raw.json

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: swiftlint-report
          path: swiftlint-raw.json

  build-and-test:
    name: Build & Test
    needs: [lint]
    runs-on: macos-26
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      # -- Restore caches --
      - name: Restore SPM cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ${{ env.DERIVED_DATA_PATH }}/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Restore DerivedData cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ${{ env.DERIVED_DATA_PATH }}/Build
          key: build-${{ runner.os }}-${{ hashFiles('**/*.swift', '**/project.yml', '**/Package.resolved') }}
          restore-keys: build-${{ runner.os }}-

      - name: Restore tools cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            /usr/local/bin/xcodegen
            /usr/local/Cellar/xcodegen
          key: tools-${{ runner.os }}-xcodegen-2.42

      # -- Setup --
      - name: Install tools
        run: TOOLS="xcodegen" make install-tools

      - name: Generate project
        run: make project

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
            if 'iOS-26-2' not in runtime:
              continue
            for d in devices:
              if d['name'] == 'iPhone 17' and d['isAvailable']:
                print(d['udid']); sys.exit(0)
          ")
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      # -- Build & Test --
      - name: Build
        run: make build-for-testing

      - name: Test package
        run: make test-package

      - name: Test app
        run: make test-app

      # -- Post-process --
      - name: Upload snapshot failures
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: snapshot-failures
          path: "**/Failures/*.png"
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: |
            TestResults.xcresult
            build/reports/xcodebuild-package.log
            build/reports/xcodebuild-app.log
