name: Record Snapshots

# Run manually when snapshot references need re-recording on CI hardware.
# This ensures references match CI's GPU/rendering — eliminates false failures.
on:
  workflow_dispatch:

concurrency:
  group: snapshot-record
  cancel-in-progress: true

jobs:
  record:
    name: Record Snapshot References
    runs-on: macos-26
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Cache Homebrew tools
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            /usr/local/bin/xcodegen
            /usr/local/Cellar/xcodegen
          key: tools-${{ runner.os }}-xcodegen-2.42

      - name: Install tools
        run: TOOLS="xcodegen git-lfs xcpretty slather" make install-tools

      - name: Bootstrap secrets
        env:
          TMDB_ACCESS_TOKEN: ${{ secrets.TMDB_ACCESS_TOKEN }}
        run: make keys

      - name: Generate project
        run: make project

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
            if 'iOS-26-2' not in runtime:
              continue
            for d in devices:
              if d['name'] == 'iPhone 17' and d['isAvailable']:
                print(d['udid']); sys.exit(0)
          ")
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Record snapshots
        run: make snapshot-record

      - name: Commit updated references
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Packages/DesignSystem/Tests/DesignSystemSnapshotTests/__Snapshots__
          if git diff --staged --quiet; then
            echo "No snapshot changes — references already match CI rendering."
          else
            git commit -m "chore: re-record snapshot references on CI runner"
            git push
          fi
